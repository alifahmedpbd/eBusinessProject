{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">

<h2>Add / Edit Service</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">
<label>Title</label>
<input type="text" name="title" class="form-control" value="{{ service.title }}">
</div>

<div class="mb-3">
<label>Highlight</label>
<input type="text" name="highlight" class="form-control" value="{{ service.highlight }}">
</div>

<div class="mb-3">
<label>Description</label>
<textarea name="description" class="form-control">{{ service.description }}</textarea>
</div>

<div class="mb-3">
<label>Icon (Bootstrap Icon)</label>
<input type="text" name="icon" class="form-control" value="{{ service.icon }}">
</div>

<button class="btn btn-success">Save Service</button>

</form>

</div>

{% endblock %}
